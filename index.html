<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMara Nakliyat Platformu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* AM büyük, ara küçük logo tasarımı */
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #0056b3;
            text-decoration: none;
        }
        .logo span {
            font-size: 20px;
            font-weight: normal;
            color: #333333;
        }
        .main-title {
            text-align: center;
            margin-top: 40px;
            color: #222222;
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 30px;
            width: 280px;
            text-align: center;
            border-top: 5px solid #0056b3;
        }
        .card h3 {
            margin: 0 0 15px 0;
            color: #333333;
            font-size: 22px;
        }
        .price {
            font-size: 26px;
            font-weight: bold;
            color: #0056b3;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            background-color: #0056b3;
            color: #ffffff;
            padding: 12px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #003d82;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">AM<span>ara</span></a>
    </header>

    <h1 class="main-title">Hemen Nakliyat Teklifi Al ve Karşılaştır</h1>

    <div class="container">

        <div class="card">
            <h3>Kar Nakliyesi</h3>
            <div class="price">100.000 ₺</div>
            <a href="#" class="btn" onclick="alert('Kar Nakliyesi için teklif talebiniz alındı!')">Teklif Al</a>
        </div>

        <div class="card">
            <h3>Köpek Nakliyesi</h3>
            <div class="price">50.000 ₺</div>
            <a href="#" class="btn" onclick="alert('Köpek Nakliyesi için teklif talebiniz alındı!')">Teklif Al</a>
        </div>

        <div class="card">
            <h3>Eşya Nakliyesi</h3>
            <div class="price">150.000 ₺</div>
            <a href="#" class="btn" onclick="alert('Eşya Nakliyesi için teklif talebiniz alındı!')">Teklif Al</a>
        </div>

    </div>

</body>
</html>
